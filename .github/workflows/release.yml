name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history so we can push back to main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Resolve version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"          # e.g. v1.0.1
          VERSION="${TAG#v}"                # 1.0.1
          # Jellyfin expects 4-segment versions; pad if needed.
          case "$(echo "$VERSION" | awk -F. '{print NF}')" in
            1) VERSION="${VERSION}.0.0.0" ;;
            2) VERSION="${VERSION}.0.0" ;;
            3) VERSION="${VERSION}.0" ;;
          esac
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: dotnet test Jellyfin.Plugin.ShowTracker.sln --configuration Release --nologo

      - name: Build plugin
        run: |
          dotnet build Jellyfin.Plugin.ShowTracker/Jellyfin.Plugin.ShowTracker.csproj \
            --configuration Release \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:FileVersion=${{ steps.ver.outputs.version }} \
            -p:AssemblyVersion=${{ steps.ver.outputs.version }}

      - name: Package
        id: pkg
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          OUT_DIR=artifacts
          ZIP_NAME="showtracker_${VERSION}.zip"
          mkdir -p "$OUT_DIR"
          cp Jellyfin.Plugin.ShowTracker/bin/Release/net9.0/Jellyfin.Plugin.ShowTracker.dll "$OUT_DIR/"
          (cd "$OUT_DIR" && zip "$ZIP_NAME" Jellyfin.Plugin.ShowTracker.dll)
          CHECKSUM=$(md5sum "$OUT_DIR/$ZIP_NAME" | awk '{print $1}')
          echo "zip_path=$OUT_DIR/$ZIP_NAME"        >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME"                 >> "$GITHUB_OUTPUT"
          echo "checksum=$CHECKSUM"                 >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          # Try CHANGELOG.md section ## v<version> ... up to next ## or EOF.
          if [ -f CHANGELOG.md ]; then
            CHANGES=$(awk -v v="## v${VERSION}" '
              $0 ~ "^"v"([ ]|$)" {flag=1; next}
              /^## v/ && flag {exit}
              flag {print}
            ' CHANGELOG.md | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')
          fi
          if [ -z "$CHANGES" ]; then
            CHANGES="Release ${VERSION}"
          fi
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$CHANGES"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: ${{ steps.pkg.outputs.zip_path }}

      - name: Update manifest.json
        run: |
          VERSION=${{ steps.ver.outputs.version }}
          CHECKSUM=${{ steps.pkg.outputs.checksum }}
          ZIP_NAME=${{ steps.pkg.outputs.zip_name }}
          TAG=${{ steps.ver.outputs.tag }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"
          CHANGELOG=$(cat <<'EOF'
          ${{ steps.changelog.outputs.body }}
          EOF
          )

          # Read target ABI from build.yaml.
          TARGET_ABI=$(grep -E '^targetAbi:' build.yaml | sed -E 's/.*"([^"]+)".*/\1/')

          # Prepend the new version entry so newest is first.
          jq --arg v "$VERSION" \
             --arg c "$CHECKSUM" \
             --arg s "$SOURCE_URL" \
             --arg t "$TIMESTAMP" \
             --arg a "$TARGET_ABI" \
             --arg log "$CHANGELOG" \
             '.[0].versions = ([{
                version: $v,
                changelog: $log,
                targetAbi: $a,
                sourceUrl: $s,
                checksum: $c,
                timestamp: $t
              }] + .[0].versions)' manifest.json > manifest.json.new
          mv manifest.json.new manifest.json

      - name: Commit updated manifest to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json unchanged"
            exit 0
          fi
          git commit -m "chore(manifest): add ${{ steps.ver.outputs.tag }}"
          git push origin main
